### This is just an example config ###
test_suite_config:
  files:
    - path: ${TORCH_ROOT}/test/test_binary_ufuncs.py
      unlisted_test_mode: skip
      tests:
        - names:
            - TestBinaryUfuncs::test_scalar_support
            - TestBinaryUfuncs::test_contig_vs_transposed
          mode: mandatory_success
          tags:
            - model_1
            - model_2
          edits:
            functions:
              cpu_move:
                - name: assertEqual
                - name: assertTrue
  global:
    supported_dtypes:
      - name: float16
      - name: int64
      - name: float32
        force_xfail: true
    supported_ops:
      - name: add
        dtypes:
          - name: float16
            precision:
              atol: 1e-3
              rtol: 1e-3
          - name: int64
      - name: mul
        # force_xfail: true
      - name: sub
      - name: gcd
        # force_xfail: true
