name: tests-nightly

on:
  schedule:
    - cron: 0 2 * * *

  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to check out and test
        required: false
        type: string
        default: ''
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ''
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ''
      build_torch_spyre:
        description: Whether to re-build torch-spyre after installing the RPM
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: write

jobs:
  # ---------------------------------------------------------------------------
  # Delegate entirely to the shared test matrix.
  # Nightly always runs everything — no doc-skip logic needed.
  # ---------------------------------------------------------------------------
  run-tests:
    uses: ./.github/workflows/_test_matrix.yaml
    with:
      runner_label: linux
      extra_test_flags: --cpu-compile -vvv -s
      checkout_pytorch: true
      ref: ${{ inputs.ref || '' }}
      rpm_location: ${{ inputs.rpm_location || '' }}
      rpm_names: ${{ inputs.rpm_names || '' }}
      build_torch_spyre: ${{ inputs.build_torch_spyre == true }}

  # ---------------------------------------------------------------------------
  # Job 2: run-spyre-unit-tests (fan-in gate)
  #
  # Fans in the reusable workflow result. Reports a single green/red status.
  #   run-tests result = success -> all suites passed -> green
  #   run-tests result = failure -> one or more suites bad -> red
  # ---------------------------------------------------------------------------
  run-spyre-unit-tests:
    name: Run Spyre unit tests
    runs-on: ubuntu-latest
    needs: [run-tests]
    if: always()
    steps:
      - name: Evaluate test results
        run: |-
          RESULT="${{ needs.run-tests.result }}"
          echo "run-tests result: ${RESULT}"

          if [[ "${RESULT}" == "success" ]]; then
            echo "All test suites passed."
            exit 0
          fi

          echo "One or more test suites failed or were cancelled."
          exit 1
