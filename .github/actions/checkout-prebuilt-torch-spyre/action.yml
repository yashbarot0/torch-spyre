# =======================================================================

name: Checkout torch-spyre in pre-cloned image
description: |
  TODO: remove this action entirely
  LEGACY: we are using spyre-backend image and normal checkout action now

  Checks out the workflow's target SHA inside the pre-cloned torch-spyre
  directory baked into the image_spyre_backend runner image. Prefers the PR
  head SHA when triggered by pull_request, otherwise falls back to the SHA
  of the push, tag, schedule, or merge_group event that triggered the
  workflow.

inputs:
  cloned-dir:
    description: Path to the pre-cloned torch-spyre directory in the image.
    required: false
    # TODO: remove this action entirely
    # LEGACY: we are using spyre-backend image and normal checkout action now
    default: /home/senuser/torch-spyre
  ref:
    description: |
      Branch, tag, or SHA to check out. When set, overrides the automatic
      event-based SHA/ref detection (PR head SHA, push SHA, etc.).
    required: false
    default: ''
  repository:
    description: |
      Full clone URL of the fork to fetch from
      (e.g. "https://github.example.com/myuser/torch-spyre.git").
      Leave empty to fetch from origin (torch-spyre/torch-spyre).
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout branch/commit in pre-cloned torch-spyre
      shell: bash
      env:
        CLONED_TORCH_SPYRE_DIR: ${{ inputs.cloned-dir }}
        INPUT_REF: ${{ inputs.ref }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_REF: ${{ github.ref }}
      run: |
        source "$HOME/.bashrc"
        source /etc/profile.d/ibm-aiu-setup.sh
        # The pre-cloned repo may be owned by a different user than the
        # runner process; mark all directories as safe to avoid git's
        # "dubious ownership" error (covers the repo and any submodules).
        git config --global --add safe.directory '*'
        cd "$CLONED_TORCH_SPYRE_DIR"
        if [[ -n "$INPUT_REF" ]]; then
          TARGET_SHA="$INPUT_REF"
          TARGET_REF="$INPUT_REF"
        else
          # Prefer the PR head SHA when triggered by pull_request, otherwise
          # fall back to the SHA of the push/tag/schedule/merge_group event.
          TARGET_SHA="${PR_HEAD_SHA:-$GITHUB_SHA}"
          TARGET_REF="${PR_HEAD_REF:-$GITHUB_REF}"
        fi
        echo "TARGET_REF=${TARGET_REF}"
        echo "TARGET_SHA=${TARGET_SHA}"
        # When a fork repository is specified, add it as a remote and fetch
        # from there; otherwise fetch from origin.
        if [[ -n "$INPUT_REPOSITORY" ]]; then
          FETCH_REMOTE="$INPUT_REPOSITORY"
          echo "Fetching from fork: ${FETCH_REMOTE}"
          git remote add fork "$FETCH_REMOTE" 2>/dev/null || \
            git remote set-url fork "$FETCH_REMOTE"
          git fetch --tags --force fork "+${TARGET_SHA}" || \
            git fetch --tags --force fork
        else
          git fetch --tags --force origin "+${TARGET_SHA}" || \
            git fetch --tags --force origin
        fi
        git checkout --force "${TARGET_SHA}"
        git submodule sync --recursive
        git submodule update --init --recursive --force
        git log -1 --oneline
