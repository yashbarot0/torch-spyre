name: Gather runner info
description: |
  Prints diagnostic information about the GHA runner: identity, key paths,
  Python version, and (optionally) a full env dump and a directory listing
  of the pre-cloned torch-spyre repo.

inputs:
  verbose:
    description: |
      When 'true', also dumps sorted env, AIU env vars, and a directory
      listing of the pre-cloned repo. Defaults to 'false' for a terse log.
    required: false
    type: string
    default: 'false'
  torch_spyre_dir:
    description: Path to the pre-cloned torch-spyre directory
    required: false
    type: string
    default: torch-spyre

runs:
  using: composite
  steps:
    - name: Gather runner info
      shell: bash
      env:
        VERBOSE: ${{ inputs.verbose }}
        TORCH_SPYRE_DIR: ${{ inputs.torch_spyre_dir }}
      run: |
        source "$HOME/.bashrc"
        source /etc/profile.d/ibm-aiu-setup.sh
        echo "================================="
        date
        pwd
        whoami
        id
        echo "GHA_RUNNER_POD_NODE_NAME $GHA_RUNNER_POD_NODE_NAME"
        echo "PATH $PATH"
        echo "HOME $HOME"
        echo "TORCH_ROOT ${TORCH_ROOT:-<unset>}"
        echo "---------------------------------"
        ls -la "$HOME"
        ls -la "$HOME/installed_rpms.txt"
        cat "$HOME/installed_rpms.txt"
        echo "---------------------------------"
        python3 --version
        python3 -c 'import sys; print(sys.path)'
        if [[ "$VERBOSE" == 'true' ]]; then
          echo "--- env ---"
          env | sort
          echo "--- AIU env ---"
          env | sort | grep AIU || true
          echo "--- repo listing ---"
          echo "TORCH_SPYRE_DIR $TORCH_SPYRE_DIR"
          ls -lart "$TORCH_SPYRE_DIR" || true
        fi
        echo "================================="
