name: Build torch-spyre
description: |
  Runs `uv sync` in the pre-cloned torch-spyre directory to reconcile the
  pre-baked .venv against the freshly checked-out pyproject.toml + uv.lock,
  and force-rebuilds torch-spyre from source.

  uv sync only reinstalls torch when the resolved version or source differs
  from what's already installed (e.g. a PR bumps the torch~=2.10.0
  constraint, or the pre-baked venv has a torch from a different index than
  the pytorch-cpu source in uv.lock). torch-spyre itself is always rebuilt
  via --reinstall-package.

inputs:
  torch_spyre_dir:
    description: Path to the pre-cloned torch-spyre directory
    required: false
    type: string
    default: torch-spyre

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    - name: Build torch-spyre
      shell: bash
      env:
        TORCH_SPYRE_DIR: ${{ inputs.torch_spyre_dir }}
      run: |
        source "$HOME/.bashrc"
        source /etc/profile.d/ibm-aiu-setup.sh

        [[ "$TORCH_SPYRE_DIR" != /* ]] && TORCH_SPYRE_DIR="${PWD}/${TORCH_SPYRE_DIR}"
        echo "TORCH_SPYRE_DIR $TORCH_SPYRE_DIR"

        cd "$TORCH_SPYRE_DIR"
        uv sync \
          --verbose \
          --frozen \
          --all-extras
        source .venv/bin/activate
        uv pip show torch
        uv pip freeze
